name: C/C++ CI

on:
  push:
    branches: [ "ci-cd" ]
  pull_request:
    branches: [ "ci-cd" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: libgpiod
      run: |
        curl -S https://mirrors.edge.kernel.org/pub/software/libs/libgpiod/libgpiod-2.2.tar.gz -o libgpiod.tar.gz
        tar -xf libgpiod.tar.gz
        cd libgpiod-2.2
        ./configure --enable-bindings-cxx
        make
        sudo make install
    
    - name: ads-1115-driver
      run: |
        git clone https://github.com/berndporr/rpi_ads1115.git
        cmake .
        make
        sudo make install
      
    
    - name: make
      run: |
        cd application/
        make

  archive:
    runs-on: ubuntu-latest

    steps:
    - name: archive-artifact
      uses: actions/upload-artifact@v4
      with:
        name: digitsynth-binary
        path: ./application/build/digitsynth
    
